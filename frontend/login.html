<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pollatouch Mundial 2026 — Iniciar sesión</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="styles.css" />
  <script src="https://accounts.google.com/gsi/client" async></script>
</head>
<body>

<div class="auth-split">

  <!-- ══ IMAGE PANEL ══ -->
  <div class="auth-split-carousel">
    <div class="auth-hero-img">
      <img src="img/IMAGEN-INICIO-SESION.jpg" alt="FIFA World Cup 2026" />
      <div class="slide-overlay" style="background:linear-gradient(to top, rgba(0,0,0,.8) 0%, rgba(0,0,0,.1) 60%, transparent 100%)">
        <span class="slide-overlay-badge">FIFA WORLD CUP™</span>
        <h2 class="slide-overlay-title"><span>2026</span></h2>
        <p class="slide-overlay-sub">Only Forward · Solo Hacia Adelante</p>
      </div>
    </div>
  </div>

  <!-- ══ FORM PANEL ══ -->
  <div class="auth-split-form">
    <div class="auth-card w-100" style="max-width:380px">
      <div class="auth-logo">
        <img src="img/fifa2026-logo.png" class="trophy" alt="FIFA 2026" />
        <h1>POLLATOUCH <span>MUNDIAL</span> 2026</h1>
        <p>Ingresa a tu cuenta para apostar</p>
      </div>

      <div id="error-msg" class="alert-wc"></div>

      <!-- Google Sign-In (visible solo cuando GOOGLE_CLIENT_ID está configurado) -->
      <div id="google-signin-wrap" style="display:none;margin-bottom:.75rem">
        <div id="google-btn-container"></div>
      </div>
      <div id="google-divider" class="auth-divider" style="display:none"><span>O ingresa con tu correo</span></div>

      <form id="login-form" method="post" action="" novalidate>
        <div class="mb-3">
          <label class="form-label"><i class="bi bi-envelope me-1"></i>Correo electrónico</label>
          <input type="email" id="email" name="email" class="form-control" placeholder="tu@correo.com" autocomplete="username" />
        </div>
        <div class="mb-4">
          <label class="form-label"><i class="bi bi-lock me-1"></i>Contraseña</label>
          <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" autocomplete="current-password" />
        </div>

        <button type="submit" class="btn-fifa-gold w-100 py-2" id="btn-login">
          <i class="bi bi-box-arrow-in-right me-1"></i> Ingresar
        </button>
      </form>

      <div class="auth-footer mt-3">
        ¿No tienes cuenta? <a href="registro.html">Regístrate aquí</a>
      </div>
      <div class="auth-footer mt-2">
        <a href="recuperar-password.html" style="color:var(--text-sub);font-size:.82rem">
          <i class="bi bi-key me-1"></i>¿Olvidaste tu contraseña?
        </a>
      </div>
    </div>
  </div>

</div>

<script>
  const API = "https://polla-api-production.up.railway.app";
  if (localStorage.getItem("token")) window.location.href = "index.html";

  // ── Google Sign-In ──────────────────────────────────────────
  let _gisLoaded = false;
  let _googleClientId = null;

  window.onGoogleLibraryLoad = function () {
    _gisLoaded = true;
    _tryInitGIS();
  };

  (async function _loadGoogleConfig() {
    try {
      const r = await fetch(`${API}/config`);
      const c = await r.json();
      if (c.google_client_id) {
        _googleClientId = c.google_client_id;
        _tryInitGIS();
      }
    } catch (_) {}
  })();

  function _tryInitGIS() {
    if (!_gisLoaded || !_googleClientId) return;
    google.accounts.id.initialize({
      client_id: _googleClientId,
      callback:  _handleGoogleCredential,
    });
    const cont = document.getElementById("google-btn-container");
    google.accounts.id.renderButton(cont, {
      theme: "filled_black",
      size:  "large",
      text:  "continue_with",
      shape: "rectangular",
    });
    document.getElementById("google-signin-wrap").style.display = "block";
    document.getElementById("google-divider").style.display     = "flex";
  }

  async function _handleGoogleCredential(response) {
    const errEl = document.getElementById("error-msg");
    const btnEl = document.getElementById("btn-login");
    errEl.classList.remove("visible");
    btnEl.disabled  = true;
    btnEl.innerHTML = '<span class="spinner-wc"></span> Verificando...';
    try {
      const res = await fetch(`${API}/auth/google`, {
        method:  "POST",
        headers: { "Content-Type": "application/json" },
        body:    JSON.stringify({ token: response.credential }),
      });
      const data = await res.json();
      if (!res.ok) {
        errEl.textContent = data.error || "Error al ingresar con Google.";
        errEl.classList.add("visible");
        return;
      }
      localStorage.setItem("token",  data.token);
      localStorage.setItem("nombre", data.nombre);
      localStorage.setItem("rol",    data.rol);
      localStorage.setItem("id",     data.id);
      window.location.href = data.rol === "admin" ? "admin.html" : "index.html";
    } catch (_) {
      errEl.textContent = "No se pudo conectar con el servidor.";
      errEl.classList.add("visible");
    } finally {
      btnEl.disabled  = false;
      btnEl.innerHTML = '<i class="bi bi-box-arrow-in-right me-1"></i> Ingresar al Mundial';
    }
  }
  // ───────────────────────────────────────────────────────────

  // Mostrar aviso si la sesión expiró por inactividad
  if (new URLSearchParams(window.location.search).get("expired") === "1") {
    document.addEventListener("DOMContentLoaded", () => {
      const errorMsg = document.getElementById("error-msg");
      if (errorMsg) {
        errorMsg.textContent = "⏱ Sesión cerrada por inactividad. Inicia sesión nuevamente.";
        errorMsg.classList.add("visible");
      }
    });
  }

  const form     = document.getElementById("login-form");
  const btnLogin = document.getElementById("btn-login");
  const errorMsg = document.getElementById("error-msg");
  const EMAIL_RE = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

  function mostrarError(msg) {
    errorMsg.textContent = msg;
    errorMsg.classList.add("visible");
  }
  document.querySelectorAll("input").forEach(i => i.addEventListener("input", () => {
    errorMsg.classList.remove("visible");
    i.classList.remove("is-invalid");
  }));
  document.getElementById("email").addEventListener("blur", function () {
    if (this.value && !EMAIL_RE.test(this.value.trim()))
      this.classList.add("is-invalid");
  });

  form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const emailEl  = document.getElementById("email");
    const pwEl     = document.getElementById("password");
    const email    = emailEl.value.trim();
    const password = pwEl.value;

    emailEl.classList.remove("is-invalid");
    pwEl.classList.remove("is-invalid");

    let ok = true;
    if (!email) {
      emailEl.classList.add("is-invalid");
      ok = false;
    } else if (!EMAIL_RE.test(email)) {
      emailEl.classList.add("is-invalid");
      mostrarError("Ingresa un correo electrónico válido.");
      ok = false;
    }
    if (!password) {
      pwEl.classList.add("is-invalid");
      ok = false;
    }
    if (!ok) {
      if (!email || EMAIL_RE.test(email)) mostrarError("Por favor completa todos los campos.");
      return;
    }

    btnLogin.disabled  = true;
    btnLogin.innerHTML = '<span class="spinner-wc"></span> Verificando...';
    try {
      const res = await fetch(`${API}/login`, {
        method:  "POST",
        headers: { "Content-Type": "application/json" },
        body:    JSON.stringify({ email, password }),
      });
      const data = await res.json();
      if (!res.ok) {
        mostrarError(data.error || "Error al iniciar sesión.");
        return;
      }
      localStorage.setItem("token",  data.token);
      localStorage.setItem("nombre", data.nombre);
      localStorage.setItem("rol",    data.rol);
      localStorage.setItem("id",     data.id);
      window.location.href = data.rol === "admin" ? "admin.html" : "index.html";
    } catch (_) {
      mostrarError("No se pudo conectar con el servidor.");
    } finally {
      btnLogin.disabled = false;
      btnLogin.innerHTML = '<i class="bi bi-box-arrow-in-right me-1"></i> Ingresar al Mundial';
    }
  });
</script>
</body>
</html>
