<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Polla FIFA 2026 — Ranking</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    .rank-avatar {
      width: 52px; height: 52px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--gold);
      vertical-align: middle;
      margin-right: 10px;
      flex-shrink: 0;
    }
    .rank-avatar-default {
      width: 52px; height: 52px;
      border-radius: 50%;
      background: var(--card-bg);
      border: 2px solid rgba(255,255,255,.15);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--text-sub);
      font-size: 1.3rem;
      vertical-align: middle;
      margin-right: 10px;
      flex-shrink: 0;
    }
    .rank-nombre-wrap {
      display: inline-flex;
      align-items: center;
    }
  </style>
</head>
<body>

<!-- Sidebar overlay + drawer -->
<div class="sidebar-overlay" id="sidebar-overlay"></div>
<div class="sidebar-drawer" id="sidebar-drawer">
  <div class="sidebar-header">
    <div class="sidebar-brand">JUEGA <span>FIFA</span> 2026 <span class="navbar-hosts"><span class="hflag">🇺🇸</span><span class="hflag">🇨🇦</span><span class="hflag">🇲🇽</span></span></div>
    <button class="sidebar-close" id="sidebar-close"><i class="bi bi-x-lg"></i></button>
  </div>
  <nav class="sidebar-nav">
    <a href="index.html" class="sidebar-link"><i class="bi bi-controller"></i> Mis Apuestas</a>
    <a href="ranking.html" class="sidebar-link active"><i class="bi bi-trophy"></i> Ranking</a>
    <a href="perfil.html" class="sidebar-link"><i class="bi bi-person-circle"></i> Perfil</a>
    <div class="sidebar-divider"></div>
    <a href="admin.html" class="sidebar-link sidebar-link-admin" id="sidebar-admin-link"><i class="bi bi-gear"></i> Panel Admin</a>
  </nav>
  <div class="sidebar-footer">
    <button class="sidebar-logout-btn" id="sidebar-logout"><i class="bi bi-box-arrow-right"></i> Cerrar sesión</button>
  </div>
</div>

<nav class="navbar-wc d-flex align-items-center justify-content-between">
  <a class="navbar-brand-wc" href="index.html">
    JUEGA <span>FIFA WORLD CUP</span> 2026
    <span class="navbar-hosts"><span class="hflag">🇺🇸</span><span class="hflag">🇨🇦</span><span class="hflag">🇲🇽</span></span>
  </a>
  <div class="d-flex align-items-center gap-2">
    <a href="index.html" class="btn-fifa-outline d-none d-sm-inline-block">
      <i class="bi bi-controller me-1"></i> Mis Apuestas
    </a>
    <a href="perfil.html" class="btn-fifa-outline d-none d-sm-inline-block">
      <i class="bi bi-person-circle me-1"></i> Perfil
    </a>
    <button class="btn-danger-sm nav-logout-desktop" id="btn-logout">
      <i class="bi bi-box-arrow-right"></i> <span class="d-none d-sm-inline">Salir</span>
    </button>
    <button class="nav-hamburger" id="nav-hamburger"><i class="bi bi-list"></i></button>
  </div>
</nav>

<div class="page-wrap">
  <div class="page-header">
    <h1><i class="bi bi-trophy" style="font-size:1.6rem;vertical-align:middle;margin-right:.4rem;color:var(--gold)"></i>TABLA DE POSICIONES</h1>
    <p>Clasificación en tiempo real. Actualiza la página para ver los últimos resultados.</p>
  </div>

  <div id="ranking-container">
    <div class="empty-state">
      <span class="spinner-wc" style="width:2rem;height:2rem;border-width:3px"></span>
      <h3 style="margin-top:1rem">Cargando ranking...</h3>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  const API   = "https://polla-api-production.up.railway.app";
  const TOKEN = localStorage.getItem("token");
  const YO_ID = parseInt(localStorage.getItem("id") || "0");

  if (!TOKEN) window.location.href = "login.html";

  document.getElementById("btn-logout").addEventListener("click", () => {
    localStorage.clear();
    window.location.href = "login.html";
  });

  // ── Sidebar móvil ──
  (function() {
    const hamburger = document.getElementById("nav-hamburger");
    const drawer    = document.getElementById("sidebar-drawer");
    const overlay   = document.getElementById("sidebar-overlay");
    const closeBtn  = document.getElementById("sidebar-close");
    const logoutBtn = document.getElementById("sidebar-logout");
    const adminLink = document.getElementById("sidebar-admin-link");
    if (localStorage.getItem("rol") === "admin") adminLink.style.display = "flex";
    function open()  { drawer.classList.add("open"); overlay.classList.add("open"); document.body.style.overflow = "hidden"; }
    function close() { drawer.classList.remove("open"); overlay.classList.remove("open"); document.body.style.overflow = ""; }
    hamburger.addEventListener("click", open);
    overlay.addEventListener("click", close);
    closeBtn.addEventListener("click", close);
    logoutBtn.addEventListener("click", () => { localStorage.clear(); window.location.href = "login.html"; });
  })();

  async function cargarRanking() {
    try {
      const res  = await fetch(`${API}/ranking`, { headers: { "Authorization": `Bearer ${TOKEN}` } });
      const data = await res.json();
      renderRanking(data);
    } catch (_) {
      document.getElementById("ranking-container").innerHTML = `
        <div class="empty-state">
          <span class="empty-icon">⚠️</span>
          <h3>No se pudo cargar el ranking</h3>
        </div>`;
    }
  }

  function renderRanking(data) {
    if (!data.length) {
      document.getElementById("ranking-container").innerHTML = `
        <div class="empty-state">
          <span class="empty-icon">🏆</span>
          <h3>Nadie ha apostado todavía</h3>
          <p>¡Sé el primero en apostar!</p>
        </div>`;
      return;
    }

    const filas = data.map(u => {
      const posClase = u.posicion === 1 ? "pos-1" : u.posicion === 2 ? "pos-2" : u.posicion === 3 ? "pos-3" : "pos-n";
      const esYo     = u.id === YO_ID;
      const avatarHtml = u.foto_perfil
        ? `<img class="rank-avatar" src="${u.foto_perfil}" alt="${u.nombre}" />`
        : `<span class="rank-avatar-default"><i class="bi bi-person-fill"></i></span>`;
      return `<tr class="${esYo ? "yo-row" : ""}">
        <td><span class="pos-medal ${posClase}">${u.posicion}</span></td>
        <td>
          <span class="rank-nombre-wrap">
            ${avatarHtml}
            <span style="font-weight:600">${u.nombre}</span>
            ${esYo ? '<span class="yo-tag">TÚ</span>' : ""}
          </span>
        </td>
        <td><span class="pts-total">${u.total_puntos}</span></td>
        <td style="color:var(--gold);font-weight:700">${u.marcadores_exactos}</td>
        <td style="color:#4ade80;font-weight:700">${u.ganadores_acertados}</td>
        <td style="font-size:.88rem;color:var(--text-sub)">${u.campeon_apostado || "—"}</td>
      </tr>`;
    }).join("");

    document.getElementById("ranking-container").innerHTML = `
      <div class="ranking-card">
        <div style="overflow-x:auto">
          <table class="ranking-table">
            <thead>
              <tr>
                <th>#</th>
                <th>Jugador</th>
                <th><i class="bi bi-star-fill me-1"></i>Puntos</th>
                <th>⭐ Exactos</th>
                <th>✓ Ganador</th>
                <th>🏆 Campeón</th>
              </tr>
            </thead>
            <tbody>${filas}</tbody>
          </table>
        </div>
        <div class="legend-bar">
          ⭐ Marcador exacto = 3 pts &nbsp;·&nbsp; ✓ Solo ganador = 1 pt &nbsp;·&nbsp; 🏆 Campeón = 5 pts
        </div>
      </div>`;
  }

  cargarRanking();
</script>
</body>
</html>
